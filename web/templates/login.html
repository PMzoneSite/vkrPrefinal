<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Dev Environment Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>🎓 Dev Environment Manager</h1>
            <p class="subtitle">Вход в систему</p>
            
            <form method="post" action="/login">
                <div class="form-group">
                    <label for="username">Имя пользователя:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
            
            <div style="text-align: center; margin-top: 1rem;">
                <a href="/" style="color: #666; text-decoration: none;">← На главную</a>
            </div>
            
            <div class="demo-credentials">
                <h3>Тестовые учетные записи:</h3>
                <ul>
                    <li><strong>admin</strong> / admin123 (администратор)</li>
                    <li><strong>teacher</strong> / teacher123 (преподаватель)</li>
                    <li><strong>student001</strong> / student123 (студент)</li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
