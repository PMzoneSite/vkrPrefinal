services:
  gitea:
    image: docker.gitea.com/gitea:1.22.6
    container_name: vkr-gitea
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__server__ROOT_URL: http://localhost:3000/
      GITEA__server__HTTP_PORT: 3000
    ports:
      - "3000:3000"
      - "2223:22"
    volumes:
      - vkr-gitea:/data

volumes:
  vkr-gitea:
